args:
  - --kubelet-preferred-address-types=InternalIP
  - --kubelet-use-node-status-port
  - --kubelet-insecure-tls
  - --metric-resolution=30s
replicas: 2
resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    cpu: 200m
    memory: 300Mi
hostNetwork:
  enabled: false
apiService:
  insecureSkipTLSVerify: true
